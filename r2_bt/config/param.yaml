# Default debug config. Official match launches should pass param_blue.yaml
# or param_red.yaml explicitly via param_config.

match:
  side: "blue"

prepare_area:
  points:
    spear_pickup:
      x: 0.49
      y: -0.73
      yaw: 1.6493
      frame_id: "map"
    dock_standby:
      x: 0.02
      y: 0.76
      yaw: -3.1172
      frame_id: "map"

  motion:
    pid_profile: 1
    timeout_sec: 10.0
    retry_attempts: 3

  pick_action:
    server_name: "/pick_action"
    expected_count: 3
    timeout_sec: 45.0
    retry_attempts: 1

  spear_tool:
    service_name: "/ares_tool_node/tool_action"
    dock_extend_action: "dock_extend"
    dock_extend_timeout_sec: 70.0
    retry_attempts: 3
    args: [0.0, 0.0, 0.0, 0.0]

meilin_area:
  grid_size: 1.2
  grid_origin: [2.14, 0.49]
  initial_grid: [0, 0]
  initial_height: 0.0
  initial_yaw: 0.0
  grasp_distance: 0.4
  yaw_tolerance: 0.12
  height_tolerance: 1.0
  pose_timeout_sec: 1.0
  cell_center_tolerance: 0.15
  motion_mode: "single_axis"
  default_align_timeout: 30.0
  default_suspension_timeout: 10.0
  default_grasp_timeout: 30.0
  suspension_normal_height: 30.0

final_area:
  deck_topic: "/aruco_comm/tx_id"
  place_signal: 7
  command_timeout_sec: 0.0
  place_signal_timeout_sec: 0.0
  post_place_wait_sec: 3.0
  motion_handoff:
    distance: 0.5
    count: 2
    position_only: true
    skip_brake: true
  chassis_height:
    topic: "t0x0112_final"
    waypoint1_height: 60.0
    waypoint3_height: 20.0
    settle_sec: 0.2
  standby:
    target_x: 9.20
    target_y: -1.20
    target_yaw: -1.5708
    pid_profile: 1
    timeout_sec: 60.0
  standby_waypoint_count: 3
  standby_waypoints:
    - {target_x: 7.80, target_y: -0.60, target_yaw: -1.5708, pid_profile: 1, timeout_sec: 30.0}
    - {target_x: 8.60, target_y: -1.00, target_yaw: -1.5708, pid_profile: 1, timeout_sec: 30.0}
    - {target_x: 9.20, target_y: -1.20, target_yaw: -1.5708, pid_profile: 1, timeout_sec: 60.0}
  place_action:
    service_name: "/ares_tool_node/tool_action"
    mid_action: "arm_place_mid"
    high_action: "arm_place_high"
    timeout_sec: 30.0
    retry_attempts: 3
    args: [0.0, 0.0, 0.0, 0.0]
  targets:
    2_left: {target_x: 10.84, target_y: -1.20, target_yaw: -1.5708, pid_profile: 1, timeout_sec: 30.0}
    2_mid: {target_x: 10.30, target_y: -1.20, target_yaw: -1.5708, pid_profile: 1, timeout_sec: 30.0}
    2_right: {target_x: 9.76, target_y: -1.20, target_yaw: -1.5708, pid_profile: 1, timeout_sec: 30.0}
    3_left: {target_x: 10.84, target_y: -1.20, target_yaw: -1.5708, pid_profile: 1, timeout_sec: 30.0}
    3_mid: {target_x: 10.30, target_y: -1.20, target_yaw: -1.5708, pid_profile: 1, timeout_sec: 30.0}
    3_right: {target_x: 9.76, target_y: -1.20, target_yaw: -1.5708, pid_profile: 1, timeout_sec: 30.0}
