match:
  side: "blue"

prepare_area:
  points:
    spear_pickup:
      x: 0.49
      y: -0.73
      yaw: 1.6493
      frame_id: "map"
      motion:
        pid_profile: 1
        max_vel: 1.5
        max_wz: 0.0
        timeout_sec: 10.0
    dock_standby:
      x: 0.02
      y: 0.76
      yaw: 0.0900
      frame_id: "map"
      motion:
        pid_profile: 1
        max_vel: 1.5
        max_wz: 0.0
        timeout_sec: 10.0

  motion:
    pid_profile: 1
    max_vel: 1.5
    max_wz: 0.0
    timeout_sec: 10.0
    retry_attempts: 3

  pick_action:
    server_name: "/pick_action"
    expected_count: 3
    timeout_sec: 45.0
    retry_attempts: 1

  spear_tool:
    service_name: "/ares_tool_node/tool_action"
    dock_extend_action: "dock_extend"
    dock_extend_timeout_sec: 70.0
    retry_attempts: 3
    args: [0.0, 0.0, 0.0, 0.0]

meilin_area:
  grid_size: 1.2
  grid_origin: [2.17, 0.51]
  initial_grid: [0, 0]
  initial_height: 0.0
  initial_yaw: 0.0
  grasp_distance: 0.40
  yaw_tolerance: 0.12
  height_tolerance: 1.0
  pose_timeout_sec: 1.0
  cell_center_tolerance: 0.15
  motion_mode: "single_axis"
  move_motion:
    pid_profile: 0
    max_vel: 0.0
    max_wz: 0.0
    timeout_sec: 30.0
  fetch_motion:
    pid_profile: 0
    max_vel: 0.0
    max_wz: 0.0
    timeout_sec: 30.0
  default_align_timeout: 30.0
  default_suspension_timeout: 10.0
  default_grasp_timeout: 30.0
  suspension_normal_height: 30.0

final_area:
  deck_topic: "/aruco_comm/tx_id"
  place_signal: 7
  command_timeout_sec: 0.0
  place_signal_timeout_sec: 0.0
  post_place_wait_sec: 3.0
  motion:
    pid_profile: 1
    max_vel: 0.0
    max_wz: 0.0
    timeout_sec: 30.0
  motion_handoff:
    distance: 0.8
    count: 2
    position_only: true
    skip_brake: true
  chassis_height:
    topic: "t0x0112_final"
    waypoint1_height: 60.0
    waypoint3_height: 20.0
    settle_sec: 0.2
  standby:
    target_x: 10.49
    target_y: -0.10
    target_yaw: -1.5708
    motion:
      pid_profile: 1
      max_vel: 2.5
      max_wz: 0.0
      timeout_sec: 60.0
  standby_waypoint_count: 3
  standby_waypoints:
    - {target_x: 8.370, target_y: 3.980, target_yaw: 0.00000, motion: {pid_profile: 1, max_vel: 0.0, max_wz: 0.0, timeout_sec: 30.0}}
    - {target_x: 11.10, target_y: 4.290, target_yaw: 0.00000, motion: {pid_profile: 1, max_vel: 0.0, max_wz: 0.0, timeout_sec: 30.0}}
    - {target_x: 10.49, target_y: -0.10, target_yaw: -1.5708, motion: {pid_profile: 1, max_vel: 0.0, max_wz: 0.0, timeout_sec: 60.0}}

  place_action:
    service_name: "/ares_tool_node/tool_action"
    mid_action: "arm_place_mid"
    high_action: "arm_place_high"
    timeout_sec: 30.0
    retry_attempts: 3
    args: [0.0, 0.0, 0.0, 0.0]
  targets:
    2_left: {target_x: 10.89, target_y: -0.27, target_yaw: -1.5708, motion: {pid_profile: 1, max_vel: 0.0, max_wz: 0.0, timeout_sec: 30.0}}
    2_mid:  {target_x: 10.49, target_y: -0.27, target_yaw: -1.5708, motion: {pid_profile: 1, max_vel: 0.0, max_wz: 0.0, timeout_sec: 30.0}}
    2_right: {target_x: 9.76, target_y: -0.27, target_yaw: -1.5708, motion: {pid_profile: 1, max_vel: 0.0, max_wz: 0.0, timeout_sec: 30.0}}
    3_left: {target_x: 10.89, target_y: -0.27, target_yaw: -1.5708, motion: {pid_profile: 1, max_vel: 0.0, max_wz: 0.0, timeout_sec: 30.0}}
    3_mid:  {target_x: 10.49, target_y: -0.27, target_yaw: -1.5708, motion: {pid_profile: 1, max_vel: 0.0, max_wz: 0.0, timeout_sec: 30.0}}
    3_right: {target_x: 9.76, target_y: -0.27, target_yaw: -1.5708, motion: {pid_profile: 1, max_vel: 0.0, max_wz: 0.0, timeout_sec: 30.0}}
